<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
  #login-screen { background: white; padding: 40px; border-radius: 12px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
  #login-screen h1 { font-size: 22px; margin-bottom: 24px; color: #111; }
  #login-screen input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
  #login-screen button { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
  #login-error { color: red; font-size: 13px; margin-top: 8px; display: none; }
  #dashboard { display: none; width: 100vw; height: 100vh; flex-direction: row; }
  #sidebar { width: 300px; background: white; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; }
  #sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid #e5e5e5; display: flex; justify-content: space-between; align-items: center; }
  #sidebar-header h2 { font-size: 18px; }
  #logout-btn { font-size: 13px; color: #007aff; cursor: pointer; border: none; background: none; }
  #new-chat-btn { width: calc(100% - 24px); margin: 12px; padding: 10px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  #conversation-list { flex: 1; overflow-y: auto; }
  .conv-item { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
  .conv-item:hover, .conv-item.active { background: #f0f7ff; }
  .conv-phone { font-weight: 600; font-size: 14px; color: #111; }
  .conv-preview { font-size: 13px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-time { font-size: 11px; color: #bbb; margin-top: 2px; }
  #chat-panel { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }
  #chat-header { background: white; padding: 16px 20px; border-bottom: 1px solid #e5e5e5; font-weight: 600; font-size: 16px; }
  #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 65%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
  .msg.inbound { background: white; color: #111; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.outbound { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg-time { font-size: 11px; opacity: 0.6; margin-top: 4px; }
  #send-box { background: white; padding: 16px 20px; border-top: 1px solid #e5e5e5; display: flex; gap: 10px; }
  #send-box input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
  #send-btn { padding: 10px 20px; background: #007aff; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
  #empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 15px; }
  #new-chat-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 100; }
  #new-chat-modal.show { display: flex; }
  #new-chat-form { background: white; padding: 28px; border-radius: 12px; width: 360px; }
  #new-chat-form h3 { margin-bottom: 16px; }
  #new-chat-form input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  #new-chat-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; height: 80px; resize: none; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  #modal-send { background: #007aff; color: white; }
  #modal-cancel { background: #f0f0f0; }
</style>
</head>
<body>

{% if not logged_in %}
<div id="login-screen">
  <h1>SMS Dashboard</h1>
  <input type="text" id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />
  <button onclick="doLogin()">Sign In</button>
  <div id="login-error">Invalid username or password</div>
</div>
{% else %}
<div id="dashboard" style="display:flex">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Messages</h2>
      <button id="logout-btn" onclick="window.location='/logout'">Logout</button>
    </div>
    <button id="new-chat-btn" onclick="openNewChat()">+ New Message</button>
    <div id="conversation-list"></div>
  </div>
  <div id="chat-panel">
    <div id="empty-state">Select a conversation or start a new one</div>
    <div id="chat-view" style="display:none; flex-direction:column; height:100%;">
      <div id="chat-header"><span id="chat-phone"></span></div>
      <div id="messages-container"></div>
      <div id="send-box">
        <input type="text" id="message-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<div id="new-chat-modal">
  <div id="new-chat-form">
    <h3>New Message</h3>
    <input type="tel" id="modal-phone" placeholder="Phone number (e.g. +13105550983)" />
    <textarea id="modal-message" placeholder="Message..."></textarea>
    <div class="modal-btns">
      <button id="modal-cancel" onclick="closeNewChat()">Cancel</button>
      <button id="modal-send" onclick="sendNewChat()">Send</button>
    </div>
  </div>
</div>
{% endif %}

<script>
{% if not logged_in %}
function doLogin() {
  var u = document.getElementById('username').value;
  var p = document.getElementById('password').value;
  fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: u, password: p})
  }).then(function(r) {
    if (r.ok) window.location.reload();
    else document.getElementById('login-error').style.display = 'block';
  });
}
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
{% else %}
var activePhone = null;

function formatTime(ts) {
  var d = new Date(ts);
  return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}

function loadConversations() {
  fetch('/api/conversations').then(function(r) { return r.json(); }).then(function(data) {
    var list = document.getElementById('conversation-list');
    list.innerHTML = '';
    data.forEach(function(c) {
      var el = document.createElement('div');
      el.className = 'conv-item' + (c.phone === activePhone ? ' active' : '');
      el.innerHTML = '<div class="conv-phone">' + c.phone + '</div><div class="conv-preview">' + (c.direction === 'inbound' ? '← ' : '→ ') + c.message + '</div><div class="conv-time">' + formatTime(c.created_at) + '</div>';
      el.onclick = function() { openConversation(c.phone); };
      list.appendChild(el);
    });
  });
}

function openConversation(phone) {
  activePhone = phone;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';
  document.getElementById('chat-phone').textContent = phone;
  loadMessages();
  loadConversations();
}

function loadMessages() {
  if (!activePhone) return;
  fetch('/api/messages/' + encodeURIComponent(activePhone)).then(function(r) { return r.json(); }).then(function(data) {
    var container = document.getElementById('messages-container');
    var atBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
    container.innerHTML = '';
    data.forEach(function(m) {
      var el = document.createElement('div');
      el.className = 'msg ' + m.direction;
      el.innerHTML = m.message + '<div class="msg-time">' + formatTime(m.created_at) + '</div>';
      container.appendChild(el);
    });
    if (atBottom) container.scrollTop = container.scrollHeight;
  });
}

function sendMessage() {
  var input = document.getElementById('message-input');
  var msg = input.value.trim();
  if (!msg || !activePhone) return;
  input.value = '';
  fetch('/api/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({phoneNumber: activePhone, message: msg})
  }).then(function() { loadMessages(); loadConversations(); });
}

function openNewChat() {
  document.getElementById('new-chat-modal').classList.add('show');
  document.getElementById('modal-phone').focus();
}
function closeNewChat() {
  document.getElementById('new-chat-modal').classList.remove('show');
  document.getElementById('modal-phone').value = '';
  document.getElementById('modal-message').value = '';
}
function sendNewChat() {
  var phone = document.getElementById('modal-phone').value.trim();
  var msg = document.getElementById('modal-message').value.trim();
  if (!phone || !msg) return;
  fetch('/api/send', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({phoneNumber: phone, message: msg})
  }).then(function() {
    closeNewChat();
    openConversation(phone);
    loadConversations();
  });
}

loadConversations();
setInterval(function() { loadConversations(); loadMessages(); }, 5000);
{% endif %}
</script>
</body>
</html>
